services:
  victim:
    build: ./victim
    ports:
      - "5000:5000"
    volumes:
      - victim_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 20

  traffic:
    build: ./traffic
    environment:
      TARGET: ${TARGET:-http://victim:5000}
      ATTACK_DURATION: ${ATTACK_DURATION:-30}
      REQUESTS_PER_SECOND: ${REQUESTS_PER_SECOND:-10}
      THREADS: ${THREADS:-3}
      NORMAL_TRAFFIC_RATIO: ${NORMAL_TRAFFIC_RATIO:-0.3}
      NORMAL_LOGIN_RATIO: ${NORMAL_LOGIN_RATIO:-0.10}
      NORMAL_LOGIN_FAILURE_RATE: ${NORMAL_LOGIN_FAILURE_RATE:-0.05}
      RANDOM_SEED: ${RANDOM_SEED:-42}
      SCENARIO_NAME: ${SCENARIO_NAME:-adhoc}
      ATTACK_STYLE: ${ATTACK_STYLE:-brute_force}
      WARMUP_SECONDS: ${WARMUP_SECONDS:-20}
      COOLDOWN_SECONDS: ${COOLDOWN_SECONDS:-20}
      NORMAL_IP_POOL: ${NORMAL_IP_POOL:-15}
      ATTACK_IP_POOL: ${ATTACK_IP_POOL:-10}
      LABEL_FILE: /logs/traffic_labels.jsonl
    volumes:
      - victim_logs:/logs
    depends_on:
      victim:
        condition: service_healthy

  ml:
    build: ./ml
    volumes:
      - victim_logs:/logs
      - ./output:/app/output
    environment:
      DB_HOST: db
      DB_NAME: logs
      DB_USER: postgres
      DB_PASSWORD: admin
      MODEL_TYPE: isolation_forest
      MODEL_CONTAMINATION: 0.3
      USE_THRESHOLD_TUNING: ${USE_THRESHOLD_TUNING:-true}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-0.1}
      HISTORY_WINDOWS: ${HISTORY_WINDOWS:-60}
    depends_on:
      victim:
        condition: service_healthy
      db:
        condition: service_healthy

  ml_eval:
    build: ./ml
    command: ["python", "-u", "evaluate_models.py"]
    profiles: ["evaluation"]
    volumes:
      - victim_logs:/logs
      - ./output:/app/output
    environment:
      DB_HOST: db
      DB_NAME: logs
      DB_USER: postgres
      DB_PASSWORD: admin
      EVAL_WINDOW_SIZE: 10
      EVAL_CONTAMINATION: 0.3
      EVAL_MIN_BASELINE_WINDOWS: 3
      RULE_REQUESTS_PER_WINDOW: ${RULE_REQUESTS_PER_WINDOW:-8}
      RULE_FAILED_LOGINS: ${RULE_FAILED_LOGINS:-3}
      RULE_FAILED_LOGIN_RATIO: ${RULE_FAILED_LOGIN_RATIO:-0.5}
      RULE_ERROR_REQUESTS: ${RULE_ERROR_REQUESTS:-3}
    depends_on:
      victim:
        condition: service_healthy
      db:
        condition: service_healthy

  visual:
    build: ./visual
    environment:
      DB_HOST: db
      DB_NAME: logs
      DB_USER: postgres
      DB_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./output:/app/output

  dashboard:
    build: ./dashboard
    profiles: ["dashboard"]
    ports:
      - "8080:8080"
    environment:
      OUTPUT_DIR: /app/output
    volumes:
      - ./output:/app/output

  
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: logs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  victim_logs:
  pgdata:
